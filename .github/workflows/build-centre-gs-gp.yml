name: Build centre GP and GS percentages
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml pandas openpyxl
      - name: Aggregate 2021-22 through 2025-26 GP and GS
        run: |
          python - <<'PY'
          import io,time,random,unicodedata,re,requests,pandas as pd
          from bs4 import BeautifulSoup,Comment
          PLAYERS=['Nikola Jokić','Victor Wembanyama','Joel Embiid','Robert Williams','Jusuf Nurkić','Steven Adams','Isaiah Hartenstein','Jarrett Allen','Rudy Gobert','Jakob Poeltl','Myles Turner','Walker Kessler','Kevon Looney','Al Horford','Dwight Powell','Ivica Zubac','Brook Lopez','Bam Adebayo','Goga Bitadze','Jalen Duren','Luke Kornet','Onyeka Okongwu','Jock Landale','Alperen Şengün','Clint Capela','Mitchell Robinson','Kelly Olynyk','Andre Drummond','Jaxson Hayes','Moritz Wagner','Jonas Valančiūnas','Deandre Ayton','Nic Claxton','Mason Plumlee','Nikola Vučević','Drew Eubanks','Nick Richards']
          def norm(x):
            return ''.join(c for c in unicodedata.normalize('NFKD',str(x)) if not unicodedata.combining(c)).replace('−','-').replace('*','').strip().lower()
          target={norm(x):x for x in PLAYERS}
          s=requests.Session(); s.headers.update({'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36','Accept-Language':'en-US,en;q=0.9','Referer':'https://www.basketball-reference.com/'})
          rows=[]
          for year in range(2022,2027):
            url=f'https://www.basketball-reference.com/leagues/NBA_{year}_per_game.html'
            for attempt in range(8):
              r=s.get(url,timeout=90)
              print(year,attempt+1,r.status_code,len(r.content),flush=True)
              if r.status_code==200 and len(r.content)>10000: break
              time.sleep(6*(attempt+1)+random.uniform(1,3))
            else: raise RuntimeError(f'failed {url}')
            soup=BeautifulSoup(r.text,'lxml')
            table=soup.find('table',id='per_game_stats') or soup.find('table',id='per_game')
            if table is None:
              for c in soup.find_all(string=lambda x:isinstance(x,Comment)):
                if 'per_game' in c and '<table' in c:
                  frag=BeautifulSoup(c,'lxml'); table=frag.find('table',id='per_game_stats') or frag.find('table',id='per_game')
                  if table is not None: break
            if table is None: raise RuntimeError(f'table missing {year}')
            for tr in table.select('tbody tr'):
              if 'thead' in tr.get('class',[]): continue
              pc=tr.select_one('[data-stat="name_display"],[data-stat="player"]')
              if pc is None: continue
              key=norm(pc.get_text())
              if key not in target: continue
              team=tr.select_one('[data-stat="team_name_abbr"],[data-stat="team_id"]')
              tm=team.get_text(strip=True) if team else ''
              # Prefer TOT row when present; otherwise individual team rows are summed below.
              gp=tr.select_one('[data-stat="games"]'); gs=tr.select_one('[data-stat="games_started"]')
              def val(c):
                try:return int(float(c.get_text().replace(',','').strip())) if c else 0
                except:return 0
              rows.append({'player':target[key],'season_end':year,'team':tm,'gp':val(gp),'gs':val(gs)})
            time.sleep(random.uniform(3,5))
          raw=pd.DataFrame(rows)
          final=[]
          for player in PLAYERS:
            d=raw[raw.player==player].copy()
            use=[]
            for year,g in d.groupby('season_end'):
              if (g.team=='TOT').any(): use.append(g[g.team=='TOT'].iloc[0])
              else: use.extend([r for _,r in g.iterrows()])
            u=pd.DataFrame(use)
            gp=int(u.gp.sum()) if not u.empty else 0; gs=int(u.gs.sum()) if not u.empty else 0
            pct=gs/gp if gp else None
            final.append({'player':player,'gp_2021_22_to_2025_26':gp,'gs_2021_22_to_2025_26':gs,'gs_pct':round(pct,4) if pct is not None else None,'role':'Majority Starter' if pct is not None and pct>0.5 else ('Majority Bench' if pct is not None and pct<0.5 else 'Even Split')})
          out=pd.DataFrame(final)
          missing=out[out.gp_2021_22_to_2025_26==0]
          print(out.to_string(index=False),flush=True)
          if len(missing): raise RuntimeError('missing players: '+','.join(missing.player))
          raw.to_csv('centre_gp_gs_raw.csv',index=False)
          out.to_csv('centre_gp_gs_summary.csv',index=False)
          with pd.ExcelWriter('centre_gp_gs_summary.xlsx',engine='openpyxl') as w:
            out.to_excel(w,index=False,sheet_name='Summary'); raw.to_excel(w,index=False,sheet_name='Raw')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: centre-gp-gs-results
          path: |
            centre_gp_gs_summary.csv
            centre_gp_gs_raw.csv
            centre_gp_gs_summary.xlsx
