name: Build two-season centre GP and GS percentages
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pandas openpyxl
      - name: Aggregate 2024-25 and 2025-26 GP and GS from NBA stats
        run: |
          python - <<'PY'
          import re,time,unicodedata,requests,pandas as pd
          PLAYERS=['Nikola Jokić','Victor Wembanyama','Moussa Diabaté','Zach Edey','Ivica Zubac','Joel Embiid','Steven Adams','Neemias Queta','Jarrett Allen','Bam Adebayo','Al Horford','Rudy Gobert','Donovan Clingan','Karl-Anthony Towns','Goga Bitadze','Isaiah Hartenstein','Jalen Duren','Wendell Carter Jr.','Jaxson Hayes','Jakob Poeltl','Onyeka Okongwu','Kristaps Porziņģis','Luke Kornet','Alperen Şengün','Clint Capela','Brook Lopez',"Kel'el Ware",'Thomas Bryant','Isaiah Stewart']
          def norm(x):
            x=''.join(c for c in unicodedata.normalize('NFKD',str(x)) if not unicodedata.combining(c)).lower()
            return re.sub(r'[^a-z0-9]+','',x)
          target={norm(x):x for x in PLAYERS}
          s=requests.Session(); s.headers.update({
            'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36',
            'Accept':'application/json, text/plain, */*','Accept-Language':'en-US,en;q=0.9',
            'Origin':'https://www.nba.com','Referer':'https://www.nba.com/'})
          endpoint='https://stats.nba.com/stats/leaguedashplayerstats'
          def fetch(season,starterbench=''):
            params={'College':'','Conference':'','Country':'','DateFrom':'','DateTo':'','Division':'','DraftPick':'','DraftYear':'','GameScope':'','GameSegment':'','Height':'','LastNGames':'0','LeagueID':'00','Location':'','MeasureType':'Base','Month':'0','OpponentTeamID':'0','Outcome':'','PORound':'0','PaceAdjust':'N','PerMode':'Totals','Period':'0','PlayerExperience':'','PlayerPosition':'','PlusMinus':'N','Rank':'N','Season':season,'SeasonSegment':'','SeasonType':'Regular Season','ShotClockRange':'','StarterBench':starterbench,'TeamID':'0','VsConference':'','VsDivision':'','Weight':''}
            for attempt in range(8):
              r=s.get(endpoint,params=params,timeout=120)
              print('GET',season,starterbench or 'All',attempt+1,r.status_code,len(r.content),flush=True)
              if r.status_code==200 and r.text.startswith('{'):
                js=r.json(); rs=js['resultSets'][0]; return pd.DataFrame(rs['rowSet'],columns=rs['headers'])
              time.sleep(8*(attempt+1))
            raise RuntimeError(f'NBA stats failed {season} {starterbench}')
          raw=[]
          for season in ('2024-25','2025-26'):
            all_df=fetch(season,'')
            st_df=fetch(season,'Starters')
            starts={norm(r['PLAYER_NAME']):int(r['GP']) for _,r in st_df.iterrows()}
            for _,r in all_df.iterrows():
              k=norm(r['PLAYER_NAME'])
              if k in target:
                raw.append({'player':target[k],'season':season,'gp':int(r['GP']),'gs':starts.get(k,0)})
          raw=pd.DataFrame(raw)
          final=[]
          for p in PLAYERS:
            d=raw[raw.player==p]
            gp=int(d.gp.sum()) if not d.empty else 0; gs=int(d.gs.sum()) if not d.empty else 0
            pct=gs/gp if gp else None
            final.append({'player':p,'gp_2024_25_to_2025_26':gp,'gs_2024_25_to_2025_26':gs,'gs_pct':round(pct,4) if pct is not None else None,'role':'Majority Starter' if pct is not None and pct>0.5 else ('Majority Bench' if pct is not None and pct<0.5 else 'Even Split')})
          out=pd.DataFrame(final); missing=out[out.gp_2024_25_to_2025_26==0]
          raw.to_csv('centre_gp_gs_raw_2seasons.csv',index=False)
          out.to_csv('centre_gp_gs_summary_2seasons.csv',index=False)
          missing.to_csv('centre_gp_gs_missing_2seasons.csv',index=False)
          with pd.ExcelWriter('centre_gp_gs_summary_2seasons.xlsx',engine='openpyxl') as w:
            out.to_excel(w,index=False,sheet_name='Summary'); raw.to_excel(w,index=False,sheet_name='Raw'); missing.to_excel(w,index=False,sheet_name='Missing')
          print(out.to_string(index=False),flush=True)
          if len(missing): raise RuntimeError('missing players: '+','.join(missing.player))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: centre-gp-gs-two-season-results
          path: |
            centre_gp_gs_summary_2seasons.csv
            centre_gp_gs_raw_2seasons.csv
            centre_gp_gs_missing_2seasons.csv
            centre_gp_gs_summary_2seasons.xlsx
          if-no-files-found: error
