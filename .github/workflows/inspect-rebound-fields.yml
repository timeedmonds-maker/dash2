name: Inspect Basketball Reference rebound fields
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml pandas
      - name: Inspect on-off columns
        run: |
          python - <<'PY'
          import io, json, time, random, requests, pandas as pd
          from bs4 import BeautifulSoup, Comment
          headers={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36','Accept':'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8','Accept-Language':'en-US,en;q=0.9','Referer':'https://www.basketball-reference.com/'}
          s=requests.Session(); s.headers.update(headers)
          url='https://www.basketball-reference.com/teams/HOU/2026/on-off/'
          err=None
          for i in range(7):
            try:
              r=s.get(url,timeout=90)
              print('attempt',i+1,'status',r.status_code,'len',len(r.content),flush=True)
              if r.status_code==200 and len(r.content)>5000: break
              err=RuntimeError(f'status={r.status_code} len={len(r.content)}')
            except Exception as e: err=e
            time.sleep(5*(i+1)+random.uniform(.5,2))
          else: raise err
          soup=BeautifulSoup(r.text,'lxml'); t=soup.find('table',id='on_off')
          if t is None:
            for c in soup.find_all(string=lambda x:isinstance(x,Comment)):
              if 'on_off' in c and '<table' in c:
                t=BeautifulSoup(c,'lxml').find('table',id='on_off')
                if t is not None: break
          if t is None: raise RuntimeError('on_off table not found')
          df=pd.read_html(io.StringIO(str(t)))[0]
          cols=['|'.join(str(x) for x in tup) for tup in df.columns] if isinstance(df.columns,pd.MultiIndex) else [str(x) for x in df.columns]
          print('\n'.join(cols)); open('rebound_columns.json','w').write(json.dumps(cols,indent=2)); df.to_csv('houston_onoff_full.csv',index=False)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: rebound-field-inspection
          path: |
            rebound_columns.json
            houston_onoff_full.csv
