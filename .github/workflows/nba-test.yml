name: Download Basketball Reference on-off HTML
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Download Houston page
        run: |
          python - <<'PY'
          import requests
          u='https://www.basketball-reference.com/teams/HOU/2026/on-off/'
          r=requests.get(u,headers={'User-Agent':'Mozilla/5.0'},timeout=60)
          r.raise_for_status()
          open('hou_onoff.html','wb').write(r.content)
          print(len(r.content))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: hou-onoff-html
          path: hou_onoff.html
