name: Download NBA on-off page HTML
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Download Houston NBA page
        run: |
          python - <<'PY'
          import requests, json
          u='https://www.nba.com/stats/team/1610612745/onoffcourt-advanced?Season=2025-26&SeasonType=Regular%20Season'
          headers={
            'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            'Accept':'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
            'Accept-Language':'en-US,en;q=0.9'
          }
          r=requests.get(u,headers=headers,timeout=60)
          open('nba_hou_onoff.html','wb').write(r.content)
          open('nba_download_meta.json','w').write(json.dumps({'status':r.status_code,'length':len(r.content),'url':r.url},indent=2))
          print(r.status_code, len(r.content))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: nba-hou-onoff-html
          path: |
            nba_hou_onoff.html
            nba_download_meta.json
