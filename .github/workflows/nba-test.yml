name: NBA alternate source test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml pandas
      - name: Test alternate sources
        run: |
          python - <<'PY'
          import requests, json
          urls=[
            'https://www.basketball-reference.com/teams/HOU/2026/on-off/',
            'https://www.basketball-reference.com/teams/HOU/2026.html',
            'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
            'https://www.nba.com/stats/team/1610612745/onoffcourt-advanced?Season=2025-26&SeasonType=Regular%20Season',
            'https://api.pbpstats.com/'
          ]
          headers={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36'}
          out={}
          for u in urls:
            try:
              r=requests.get(u,headers=headers,timeout=30,allow_redirects=True)
              out[u]={'status':r.status_code,'length':len(r.content),'final_url':r.url,'head':r.text[:250]}
            except Exception as e:
              out[u]={'error':repr(e)}
          open('alternate_test_result.json','w').write(json.dumps(out,indent=2))
          print(json.dumps(out,indent=2))
          PY
      - name: Commit result
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add alternate_test_result.json
          git commit -m 'Add alternate source connectivity result' || exit 0
          git push
