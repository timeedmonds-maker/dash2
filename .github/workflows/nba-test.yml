name: Build two-season centre on-off leaderboard
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml pandas numpy
      - name: Scrape and aggregate Basketball Reference on-off data
        run: |
          cat > build_leaderboard.py <<'PY'
          import io, json, re, time, random
          from pathlib import Path
          import numpy as np
          import pandas as pd
          import requests
          from bs4 import BeautifulSoup, Comment

          TEAMS=['ATL','BOS','BRK','CHO','CHI','CLE','DAL','DEN','DET','GSW','HOU','IND','LAC','LAL','MEM','MIA','MIL','MIN','NOP','NYK','OKC','ORL','PHI','PHO','POR','SAC','SAS','TOR','UTA','WAS']
          YEARS=[2025,2026]
          HEADERS={
            'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            'Accept':'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
            'Accept-Language':'en-US,en;q=0.9',
            'Referer':'https://www.basketball-reference.com/'
          }
          session=requests.Session(); session.headers.update(HEADERS)
          failures=[]; onoff_rows=[]; roster_rows=[]

          def clean_name(x):
            x=str(x)
            x=re.sub(r'[\*†‡]+$','',x).strip()
            x=re.sub(r'\s+',' ',x)
            return x

          def get(url, attempts=5):
            err=None
            for i in range(attempts):
              try:
                r=session.get(url,timeout=75)
                if r.status_code==200 and len(r.content)>5000:
                  return r.text
                err=RuntimeError(f'status={r.status_code} len={len(r.content)}')
              except Exception as e:
                err=e
              time.sleep(5*(i+1)+random.uniform(.5,2))
            raise err

          def find_table(text, table_id):
            soup=BeautifulSoup(text,'lxml')
            t=soup.find('table',id=table_id)
            if t is not None: return t
            for c in soup.find_all(string=lambda x:isinstance(x,Comment)):
              if table_id in c and '<table' in c:
                cs=BeautifulSoup(c,'lxml')
                t=cs.find('table',id=table_id)
                if t is not None: return t
            return None

          def flatten_cols(df):
            if isinstance(df.columns,pd.MultiIndex):
              cols=[]
              for a,b in df.columns:
                a=str(a); b=str(b)
                if a.startswith('Unnamed'): cols.append(b)
                else: cols.append(f'{a}_{b}')
              df.columns=cols
            else: df.columns=[str(c) for c in df.columns]
            return df

          for year in YEARS:
            season=f'{year-1}-{str(year)[-2:]}'
            for team in TEAMS:
              print('FETCH',season,team,flush=True)
              try:
                u=f'https://www.basketball-reference.com/teams/{team}/{year}/on-off/'
                text=get(u)
                t=find_table(text,'on_off')
                if t is None: raise RuntimeError('on_off table not found')
                df=flatten_cols(pd.read_html(io.StringIO(str(t)))[0])
                df=df.rename(columns={'Player':'PLAYER','Split':'SPLIT','MP':'MIN','Team_Pace':'PACE','Team_ORtg':'OFF_RTG','Opponent_ORtg':'DEF_RTG','Difference_ORtg':'NET_RTG'})
                df['PLAYER']=df['PLAYER'].ffill().map(clean_name)
                df=df[df['SPLIT'].isin(['On Court','Off Court'])].copy()
                for c in ['MIN','PACE','OFF_RTG','DEF_RTG','NET_RTG']:
                  df[c]=pd.to_numeric(df[c],errors='coerce')
                df['TEAM']=team; df['SEASON']=season
                onoff_rows.append(df[['PLAYER','SPLIT','MIN','PACE','OFF_RTG','DEF_RTG','NET_RTG','TEAM','SEASON']])
              except Exception as e:
                failures.append({'TYPE':'ONOFF','TEAM':team,'SEASON':season,'ERROR':repr(e)})
                print('FAIL ONOFF',team,season,repr(e),flush=True)
              time.sleep(3.4+random.uniform(.1,.8))

              try:
                u=f'https://www.basketball-reference.com/teams/{team}/{year}.html'
                text=get(u)
                t=find_table(text,'roster')
                if t is None: raise RuntimeError('roster table not found')
                rd=flatten_cols(pd.read_html(io.StringIO(str(t)))[0])
                player_col=next(c for c in rd.columns if c.lower()=='player')
                pos_col=next((c for c in rd.columns if c.lower()=='pos'),None)
                if pos_col is None: raise RuntimeError(f'Pos column missing: {list(rd.columns)}')
                rd=rd[[player_col,pos_col]].rename(columns={player_col:'PLAYER',pos_col:'POS'})
                rd['PLAYER']=rd['PLAYER'].map(clean_name)
                rd['POS']=rd['POS'].astype(str).str.upper().str.strip()
                rd['TEAM']=team; rd['SEASON']=season
                roster_rows.append(rd)
              except Exception as e:
                failures.append({'TYPE':'ROSTER','TEAM':team,'SEASON':season,'ERROR':repr(e)})
                print('FAIL ROSTER',team,season,repr(e),flush=True)
              time.sleep(3.4+random.uniform(.1,.8))

          if not onoff_rows: raise SystemExit('No on-off rows collected')
          raw=pd.concat(onoff_rows,ignore_index=True)
          rosters=pd.concat(roster_rows,ignore_index=True) if roster_rows else pd.DataFrame(columns=['PLAYER','POS','TEAM','SEASON'])
          raw.to_csv('raw_bref_onoff.csv',index=False)
          rosters.to_csv('raw_bref_rosters.csv',index=False)
          pd.DataFrame(failures).to_csv('failures.csv',index=False)

          # Player is centre-eligible if BRef lists C anywhere across either season.
          pos=(rosters.groupby('PLAYER',as_index=False)
               .agg(POSITIONS=('POS',lambda s:'|'.join(sorted(set(x for x in s if x and x!='NAN'))))))
          pos['IS_CENTRE']=pos['POSITIONS'].str.contains(r'(^|[-/])C($|[-/])|CENTER',regex=True,na=False)

          def aggregate(split,prefix):
            d=raw[raw.SPLIT==split].copy()
            d['WEIGHT']=d['MIN']*d['PACE']/48.0
            for c in ['OFF_RTG','DEF_RTG','NET_RTG']:
              d[c+'_W']=d[c]*d['WEIGHT']
            g=(d.groupby('PLAYER',as_index=False)
               .agg(MIN=('MIN','sum'),WEIGHT=('WEIGHT','sum'),OFF_W=('OFF_RTG_W','sum'),DEF_W=('DEF_RTG_W','sum'),NET_W=('NET_RTG_W','sum'),TEAMS=('TEAM',lambda s:','.join(sorted(set(s))))))
            g[prefix+'_MIN']=g['MIN']; g[prefix+'_OFF_RTG']=g['OFF_W']/g['WEIGHT']; g[prefix+'_DEF_RTG']=g['DEF_W']/g['WEIGHT']; g[prefix+'_NET_RTG']=g['NET_W']/g['WEIGHT']; g[prefix+'_TEAMS']=g['TEAMS']
            return g[['PLAYER',prefix+'_MIN',prefix+'_OFF_RTG',prefix+'_DEF_RTG',prefix+'_NET_RTG',prefix+'_TEAMS']]

          on=aggregate('On Court','ON'); off=aggregate('Off Court','OFF')
          lb=on.merge(off,on='PLAYER',how='inner').merge(pos,on='PLAYER',how='left')
          lb['IS_CENTRE']=lb['IS_CENTRE'].fillna(False)
          lb['ON_OFF_SWING']=lb['ON_NET_RTG']-lb['OFF_NET_RTG']
          lb['TEAMS']=lb.apply(lambda r:','.join(sorted(set(str(r.ON_TEAMS).split(','))|set(str(r.OFF_TEAMS).split(',')))),axis=1)
          lb=lb[(lb.IS_CENTRE)&(lb.ON_MIN>=1500)].sort_values(['ON_OFF_SWING','ON_MIN'],ascending=[False,False]).reset_index(drop=True)
          lb.insert(0,'RANK',np.arange(1,len(lb)+1))
          cols=['RANK','PLAYER','POSITIONS','TEAMS','ON_MIN','ON_OFF_RTG','ON_DEF_RTG','ON_NET_RTG','OFF_OFF_RTG','OFF_DEF_RTG','OFF_NET_RTG','ON_OFF_SWING']
          lb[cols].to_csv('centre_leaderboard_bref.csv',index=False)
          open('summary.json','w').write(json.dumps({'onoff_team_seasons':len(onoff_rows),'roster_team_seasons':len(roster_rows),'failures':len(failures),'qualifiers':len(lb)},indent=2))
          print(lb[cols].to_string(index=False),flush=True)
          PY
          python build_leaderboard.py
      - uses: actions/upload-artifact@v4
        with:
          name: centre-onoff-results
          path: |
            centre_leaderboard_bref.csv
            raw_bref_onoff.csv
            raw_bref_rosters.csv
            failures.csv
            summary.json
